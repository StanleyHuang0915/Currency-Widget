<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匯率</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #191919;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }
        .update-time {
            font-size: 11px;
            color: #888;
            margin-bottom: 16px;
        }
        .rates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        .rate-card {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            border: 1px solid #333;
        }
        .rate-card .pair {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .rate-card .value {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
        }
        .rate-card .unit {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .base-note {
            margin-top: 16px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }
        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        .error {
            text-align: center;
            color: #ff6b6b;
            padding: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>💱 即時匯率</h2>
    </div>
    <div class="update-time" id="update-time">載入中...</div>
    <div class="rates-grid" id="rates-grid">
        <div class="loading">載入匯率資料中...</div>
    </div>
    <div class="base-note">基準：1 TWD 兌換各幣別 ｜ 資料來源：ExchangeRate API</div>

    <script>
        const BASE = 'TWD';
        const TARGETS = [
            { code: 'JPY', name: '日圓' },
            { code: 'USD', name: '美元' },
            { code: 'EUR', name: '歐元' },
            { code: 'KRW', name: '韓元' },
            { code: 'GBP', name: '英鎊' },
            { code: 'CNY', name: '人民幣' },
            { code: 'THB', name: '泰銖' },
            { code: 'SGD', name: '新加坡元' },
        ];

        async function fetchRates() {
            try {
                const resp = await fetch(`https://open.er-api.com/v6/latest/${BASE}`);
                const data = await resp.json();

                if (data.result !== 'success') throw new Error('API error');

                const grid = document.getElementById('rates-grid');
                grid.innerHTML = '';

                TARGETS.forEach(target => {
                    const rate = data.rates[target.code];
                    if (!rate) return;

                    let displayRate;
                    if (rate >= 100) {
                        displayRate = rate.toFixed(2);
                    } else if (rate >= 1) {
                        displayRate = rate.toFixed(4);
                    } else {
                        displayRate = rate.toFixed(4);
                    }

                    const card = document.createElement('div');
                    card.className = 'rate-card';
                    card.innerHTML = `
                        <div class="pair">TWD → ${target.code}</div>
                        <div class="value">${displayRate}</div>
                        <div class="unit">${target.name}</div>
                    `;
                    grid.appendChild(card);
                });

                const now = new Date();
                document.getElementById('update-time').textContent =
                    `更新時間：${now.toLocaleDateString('zh-TW')} ${now.toLocaleTimeString('zh-TW', {hour: '2-digit', minute: '2-digit'})}`;

            } catch (err) {
                document.getElementById('rates-grid').innerHTML =
                    `<div class="error">無法載入匯率資料，請稍後再試<br>${err.message}</div>`;
            }
        }

        fetchRates();
        setInterval(fetchRates, 3600000);
    </script>
</body>
</html>
